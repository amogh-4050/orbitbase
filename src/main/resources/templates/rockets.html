<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>OrbitBase — Rockets</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #ffffff; color: #1a1a2e; }
        header { background: #0d0d2b; color: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 1.4rem; letter-spacing: 2px; text-transform: uppercase; }
        nav a { color: #a0aec0; text-decoration: none; margin-left: 24px; font-size: 0.9rem; }
        nav a:hover, nav a.active { color: #fff; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 24px; }
        .page-header { margin-bottom: 28px; }
        .page-header h2 { font-size: 1.6rem; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        thead { background: #f8fafc; }
        thead th { text-align: left; padding: 12px 16px; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        tbody tr { border-bottom: 1px solid #f1f5f9; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f8fafc; }
        tbody td { padding: 12px 16px; font-size: 0.875rem; vertical-align: middle; }
        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
        footer { text-align: center; padding: 24px; font-size: 0.8rem; color: #94a3b8; border-top: 1px solid #f1f5f9; margin-top: 60px; }
    </style>
</head>
<body>
<header>
    <h1>&#127775; OrbitBase</h1>
    <nav>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/launches}">Launches</a>
        <a th:href="@{/missions}">Missions</a>
        <a th:href="@{/agencies}">Agencies</a>
        <a th:href="@{/rockets}" class="active">Rockets</a>
        <a th:href="@{/crew}">Crew</a>
    </nav>
</header>
<div class="container">
    <div class="page-header">
        <h2>Rockets</h2>
    </div>
    <div th:if="${#lists.isEmpty(rockets)}" class="empty-state">
        <p>No rockets synced yet.</p>
    </div>
    <table th:unless="${#lists.isEmpty(rockets)}">
        <thead>
            <tr>
                <th>Name</th>
                <th>Full Name</th>
                <th>Family</th>
                <th>Variant</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${rockets}">
                <td th:text="${r.name}">—</td>
                <td th:text="${r.fullName != null ? r.fullName : '—'}">—</td>
                <td th:text="${r.family != null ? r.family : '—'}">—</td>
                <td th:text="${r.variant != null ? r.variant : '—'}">—</td>
            </tr>
        </tbody>
    </table>
</div>
<footer>OrbitBase &mdash; PES University OOAD Mini Project &mdash; Data from Launch Library 2</footer>
</body>
</html>
